name: Blob storage website CI

on:
    push:
        branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20

    - name: Install dependencies
      run: npm ci
      working-directory: cityoftraitors.com

    - name: Build
      run: npm run build
      working-directory: cityoftraitors.com

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Upload to blob storage
      uses: azure/CLI@v2
      with:
        inlineScript: |
            az storage blob upload-batch --account-name cityoftraitorscom --auth-mode login -d '$web' -s ./cityoftraitors.com/build --overwrite


    - name: logout
      run: |
            az logout
      if: always()
